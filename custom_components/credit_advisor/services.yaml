add_card:
  name: Add Credit Card
  description: >
    Research a credit card and add it to the registry. Uses the configured
    conversation agent (or the provided agent_id) to look up card details.
    If card_data is provided, saves it directly without LLM research.
  fields:
    name:
      required: true
      description: "Full name of the credit card to research (e.g. 'American Express Gold Card')"
      example: "Chase Sapphire Preferred"
      selector:
        text:
    agent_id:
      required: false
      description: "Conversation agent to use. Falls back to the default configured in integration options."
      example: "conversation.openai_home"
      selector:
        text:
    card_data:
      required: false
      description: "Pre-researched card data as a JSON object. If provided, skips the LLM research and saves directly."
      advanced: true
      selector:
        object:

remove_card:
  name: Remove Credit Card
  description: Remove a credit card from the registry by its name.
  fields:
    card_name:
      required: true
      description: "Name of the card to remove (e.g. 'American Express Gold Card')"
      example: "Chase Sapphire Preferred"
      selector:
        text:

query:
  name: Query Card Recommendation
  description: >
    Ask the LLM for a credit card recommendation based on the cards currently
    in the registry. The response is stored in the card_recommendation sensor.
  fields:
    agent_id:
      required: false
      description: "Conversation agent to use. Falls back to the default configured in integration options."
      example: "conversation.google_ai_search"
      selector:
        text:
    purchase:
      required: false
      description: "Describe the purchase you're planning (e.g. '$500 Delta flight')."
      example: "$500 airline ticket"
      selector:
        text:

list_cards:
  name: List Credit Cards
  description: List all credit cards currently in the registry. Returns card names and details.
  fields: {}
